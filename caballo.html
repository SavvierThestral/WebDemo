<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRH - Iberian Riding Horses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ivory: #F8F5EE;
            --warm-white: #FDFBF7;
            --parchment: #EDE8DC;
            --gold: #B8935A;
            --gold-light: #D4AA78;
            --gold-pale: #F0E4CA;
            --ink: #1C1B18;
            --charcoal: #2E2D29;
            --stone: #6B6860;
            --stone-light: #A09D96;
            --border: rgba(28,27,24,0.12);
            --border-strong: rgba(28,27,24,0.22);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body { font-family: 'Jost', sans-serif; background: var(--warm-white); color: var(--ink); overflow-x: hidden; }
        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }

        /* ─── NAV ─── */
        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 3rem;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(253,251,247,0.97);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            color: var(--ink);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .nav-logo svg { width: 26px; height: 26px; }
        .nav-logo svg path { stroke: var(--ink); }
        .nav-links { display: flex; align-items: center; gap: 1.8rem; list-style: none; }
        .nav-links a {
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--stone);
            text-decoration: none;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--gold); }
        .nav-cta {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--gold) !important;
            border: 1px solid var(--gold);
            padding: 0.5rem 1.3rem;
            text-decoration: none;
            transition: background 0.3s, color 0.3s !important;
        }
        .nav-cta:hover { background: var(--gold) !important; color: white !important; }

        .nav-right { display: flex; align-items: center; gap: 1.5rem; }
        .lang-switcher { display: flex; align-items: center; border: 1px solid var(--border-strong); overflow: hidden; }
        .lang-btn { font-family: 'Jost', sans-serif; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.14em; padding: 0.35rem 0.7rem; background: transparent; border: none; color: var(--stone-light); cursor: pointer; transition: background 0.25s, color 0.25s; }
        .lang-btn.active { background: var(--gold); color: white; }
        .lang-btn:hover:not(.active) { color: var(--gold); }

        @media (max-width: 1100px) {
            .nav-links { display: none; }
        }
        @media (max-width: 768px) {
            .nav { padding: 0 1.2rem; height: 60px; }
            .nav-logo-text { display: none; }
        }

        /* ─── HERO IMAGE ─── */
        .horse-hero {
            position: relative;
            width: 100%;
            height: 70vh;
            min-height: 420px;
            overflow: hidden;
            background: var(--ink);
        }
        .horse-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
            display: block;
        }
        .horse-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to top,
                rgba(28,27,24,0.85) 0%,
                rgba(28,27,24,0.3) 40%,
                rgba(28,27,24,0.1) 70%,
                transparent 100%
            );
        }
        .horse-hero-label {
            position: absolute;
            bottom: 2.5rem;
            left: 3rem;
            right: 3rem;
        }
        .horse-hero-eyebrow {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--gold-light);
            display: block;
            margin-bottom: 0.7rem;
        }
        .horse-hero-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 4vw, 4rem);
            font-weight: 400;
            color: var(--warm-white);
            line-height: 1.05;
            letter-spacing: -0.02em;
        }
        .horse-hero-breed {
            font-size: 0.9rem;
            font-weight: 300;
            color: rgba(253,251,247,0.65);
            margin-top: 0.5rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .horse-hero { height: 55vh; min-height: 320px; }
            .horse-hero-label { left: 1.2rem; right: 1.2rem; bottom: 1.8rem; }
        }

        /* ─── BACK BREADCRUMB ─── */
        .breadcrumb-bar {
            background: var(--parchment);
            padding: 0.85rem 3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.72rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--stone);
        }
        .breadcrumb-bar a {
            color: var(--stone);
            text-decoration: none;
            transition: color 0.25s;
        }
        .breadcrumb-bar a:hover { color: var(--gold); }
        .breadcrumb-bar span { color: var(--gold); }
        @media (max-width: 768px) { .breadcrumb-bar { padding: 0.75rem 1.2rem; } }

        /* ─── MAIN CONTENT ─── */
        .horse-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 3rem 6rem;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 5rem;
            align-items: start;
        }
        @media (max-width: 900px) {
            .horse-content { grid-template-columns: 1fr; gap: 3rem; padding: 3rem 1.5rem 4rem; }
        }
        @media (max-width: 480px) {
            .horse-content { padding: 2rem 1rem 3rem; }
        }

        /* ─── LEFT COLUMN ─── */
        .horse-main h2 {
            font-size: clamp(1.8rem, 3vw, 2.8rem);
            font-weight: 400;
            color: var(--ink);
            margin-bottom: 0.5rem;
            line-height: 1.1;
        }
        .horse-main .sub-breed {
            font-size: 0.82rem;
            font-weight: 400;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--stone-light);
            margin-bottom: 2.5rem;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            margin-bottom: 2.8rem;
        }
        @media (max-width: 540px) { .specs-grid { grid-template-columns: repeat(2, 1fr); } }
        .spec-item {
            background: var(--warm-white);
            padding: 1.2rem 1.4rem;
        }
        .spec-label {
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--stone-light);
            display: block;
            margin-bottom: 0.35rem;
        }
        .spec-value {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--ink);
        }
        .spec-value.highlight { color: var(--gold); }

        .horse-desc-title {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1rem;
            display: block;
        }
        .horse-desc {
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.9;
            color: var(--stone);
            margin-bottom: 2rem;
        }

        /* ─── RIGHT SIDEBAR ─── */
        .horse-sidebar {
            position: sticky;
            top: 88px;
        }
        .contact-card {
            background: var(--ink);
            padding: 2.5rem 2rem;
        }
        .contact-card-tag {
            display: inline-block;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            background: var(--gold);
            color: white;
            padding: 0.28rem 0.75rem;
            margin-bottom: 1.5rem;
        }
        .contact-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--warm-white);
            margin-bottom: 0.7rem;
            line-height: 1.25;
        }
        .contact-card p {
            font-size: 0.88rem;
            font-weight: 300;
            line-height: 1.75;
            color: rgba(253,251,247,0.6);
            margin-bottom: 2rem;
        }
        .btn-contact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: 100%;
            padding: 1rem;
            background: var(--gold);
            color: white;
            font-family: 'Jost', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.3s, transform 0.2s;
            min-height: 48px;
        }
        .btn-contact:hover { background: var(--gold-light); transform: translateY(-1px); }
        .btn-contact:active { transform: translateY(0); }

        .contact-divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 1.5rem 0;
        }
        .contact-location {
            display: flex;
            gap: 0.8rem;
            align-items: flex-start;
        }
        .contact-location svg { flex-shrink: 0; color: var(--gold); margin-top: 2px; }
        .contact-location p {
            font-size: 0.82rem;
            font-weight: 300;
            color: rgba(253,251,247,0.55);
            line-height: 1.6;
            margin-bottom: 0;
        }

        /* ─── LOADING / ERROR ─── */
        .not-found {
            text-align: center;
            padding: 8rem 2rem;
        }
        .not-found h2 {
            font-size: 2rem;
            font-weight: 400;
            color: var(--ink);
            margin-bottom: 1rem;
        }
        .not-found p { font-size: 0.95rem; font-weight: 300; color: var(--stone); margin-bottom: 2rem; }
        .not-found a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 2px;
        }

        /* ─── FOOTER ─── */
        footer {
            background: var(--ink);
            color: rgba(253,251,247,0.5);
            padding: 2rem 3rem;
            text-align: center;
            font-size: 0.78rem;
            font-weight: 300;
        }
        footer a { color: var(--gold-light); text-decoration: none; }
    </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
    <a href="index.html" class="nav-logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 26c0-6 4-10 10-12 3-1 6-3 7-6" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M16 14c-1-3 0-7 3-9" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M19 5c1 0 3 1 4 3" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M6 26l2-4" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M10 26l1-4" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="nav-logo-text">IRH - Iberian Riding Horses</span>
    </a>
    <div class="nav-right">
        <ul class="nav-links">
            <li><a href="index.html" data-i18n="nav_home">Home</a></li>
            <li><a href="catalogo.html" data-i18n="nav_catalog">Catálogo</a></li>
            <li><a href="index.html#contact" class="nav-cta" data-i18n="nav_contact">Contacto</a></li>
        </ul>
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="setLang('es')">ES</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </div>
</nav>

<!-- DYNAMIC CONTENT -->
<div id="page-content"></div>

<footer>
    <p>&copy; 2025 IRH - Iberian Riding Horses &nbsp;·&nbsp; Finca Lo Tacon s/n, San Pedro del Pinatar 30740 (Murcia) &nbsp;·&nbsp; <a href="index.html">Inicio</a> &nbsp;·&nbsp; <a href="catalogo.html">Catálogo</a></p>
</footer>

<script src="horses.js"></script>
<script>
/* Datos cargados desde horses.js */

/* ── TRANSLATIONS ── */
const tr = {
    es: {
        nav_home:'Inicio', nav_catalog:'Catálogo', nav_services:'Servicios', nav_contact:'Contacto',
        spec_discipline:'Disciplina', spec_level:'Nivel', spec_gender:'Género', spec_age:'Edad', spec_height:'Alzada', spec_profile:'Perfil jinete',
        spec_birth:'Nacimiento', spec_coat:'Capa', spec_father:'Padre', spec_mother:'Madre', spec_breeder:'Criador', spec_owner:'Titular', spec_microchip:'Microchip',
        section_pedigree:'Pedigree & Datos Registrales', section_desc:'Descripción',
        contact_title:'¿Te interesa', contact_body:'Contáctanos para más información o coordinar una visita.',
        contact_btn:'Contactar ahora', location_label:'Ubicación',
        back:'← Volver al Catálogo',
        not_found_title:'Caballo no encontrado', not_found_body:'El caballo que buscas no existe o ha sido retirado del catálogo.', not_found_link:'← Volver al Catálogo',
        years:'años'
    },
    en: {
        nav_home:'Home', nav_catalog:'Catalogue', nav_services:'Services', nav_contact:'Contact',
        spec_discipline:'Discipline', spec_level:'Level', spec_gender:'Gender', spec_age:'Age', spec_height:'Height', spec_profile:'Rider profile',
        spec_birth:'Born', spec_coat:'Coat', spec_father:'Sire', spec_mother:'Dam', spec_breeder:'Breeder', spec_owner:'Owner', spec_microchip:'Microchip',
        section_pedigree:'Pedigree & Registration', section_desc:'Description',
        contact_title:'Interested in', contact_body:'Contact us for more information or to arrange a visit.',
        contact_btn:'Contact now', location_label:'Location',
        back:'← Back to Catalogue',
        not_found_title:'Horse not found', not_found_body:'The horse you are looking for does not exist or has been removed.', not_found_link:'← Back to Catalogue',
        years:'years old'
    }
};
let currentLang = 'es';

function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (tr[lang][key] !== undefined) el.innerHTML = tr[lang][key];
    });
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === lang));
    render();
}

function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
}

function render() {
    const l = tr[currentLang];
    const id = parseInt(getParam('id'));
    const horse = horses.find(h => h.id === id);
    const container = document.getElementById('page-content');

    if (!horse) {
        container.innerHTML = `
            <div class="not-found">
                <h2>${l.not_found_title}</h2>
                <p>${l.not_found_body}</p>
                <a href="catalogo.html">${l.not_found_link}</a>
            </div>`;
        return;
    }

    document.title = `${horse.name} | IRH - Iberian Riding Horses`;

    container.innerHTML = `
        <!-- HERO -->
        <div class="horse-hero">
            <img src="${horse.image}" alt="${horse.name}">
            <div class="horse-hero-overlay"></div>
            <div class="horse-hero-label">
                <span class="horse-hero-eyebrow">${horse.disciplinaLabel} &nbsp;·&nbsp; ${horse.tag[currentLang]}</span>
                <h1 class="horse-hero-name">${horse.name}</h1>
                <p class="horse-hero-breed">${horse.breed}</p>
            </div>
        </div>

        <!-- BREADCRUMB -->
        <div class="breadcrumb-bar">
            <a href="index.html">${l.nav_home}</a>
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <a href="catalogo.html">${l.nav_catalog}</a>
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>${horse.name}</span>
        </div>

        <!-- MAIN CONTENT -->
        <div class="horse-content">

            <!-- LEFT -->
            <div class="horse-main">
                <h2>${horse.name}</h2>
                <p class="sub-breed">${horse.breed} &nbsp;·&nbsp; ${horse.age} años &nbsp;·&nbsp; ${horse.height}</p>

                <div class="specs-grid">
                    <div class="spec-item">
                        <span class="spec-label">${l.spec_discipline}</span>
                        <span class="spec-value highlight">${horse.disciplinaLabel}</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">${l.spec_level}</span>
                        <span class="spec-value">${horse.nivelLabel}</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">${l.spec_gender}</span>
                        <span class="spec-value">${horse.generoLabel}</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">${l.spec_age}</span>
                        <span class="spec-value">${horse.age} ${l.years}</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">${l.spec_height}</span>
                        <span class="spec-value">${horse.height}</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">${l.spec_profile}</span>
                        <span class="spec-value">${horse.perfilLabel}</span>
                    </div>
                </div>

                ${horse.padre ? `
                <span class="horse-desc-title" style="margin-top:2rem;">${l.section_pedigree}</span>
                <div class="specs-grid" style="margin-bottom:2rem;">
                    ${horse.nacimiento ? `<div class="spec-item"><span class="spec-label">${l.spec_birth}</span><span class="spec-value">${horse.nacimiento}</span></div>` : ''}
                    ${horse.capa ? `<div class="spec-item"><span class="spec-label">${l.spec_coat}</span><span class="spec-value">${horse.capa}</span></div>` : ''}
                    ${horse.padre ? `<div class="spec-item"><span class="spec-label">${l.spec_father}</span><span class="spec-value">${horse.padre}</span></div>` : ''}
                    ${horse.madre ? `<div class="spec-item"><span class="spec-label">${l.spec_mother}</span><span class="spec-value">${horse.madre}</span></div>` : ''}
                    ${horse.criador ? `<div class="spec-item"><span class="spec-label">${l.spec_breeder}</span><span class="spec-value">${horse.criador}</span></div>` : ''}
                    ${horse.titular ? `<div class="spec-item"><span class="spec-label">${l.spec_owner}</span><span class="spec-value">${horse.titular}</span></div>` : ''}
                    ${horse.microchip ? `<div class="spec-item" style="grid-column:1/-1;"><span class="spec-label">${l.spec_microchip}</span><span class="spec-value" style="font-size:0.82rem;letter-spacing:0.04em;">${horse.microchip}</span></div>` : ''}
                </div>` : ''}

                <span class="horse-desc-title">${l.section_desc}</span>
                <p class="horse-desc">${horse.desc[currentLang]}</p>

                <a href="catalogo.html" style="display:inline-flex; align-items:center; gap:0.5rem; color:var(--stone); text-decoration:none; font-size:0.78rem; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; border-bottom:1px solid var(--border-strong); padding-bottom:3px; transition:color 0.25s, border-color 0.25s;"
                   onmouseover="this.style.color='var(--gold)'; this.style.borderColor='var(--gold)'"
                   onmouseout="this.style.color='var(--stone)'; this.style.borderColor='var(--border-strong)'">
                    ${l.back}
                </a>
            </div>

            <!-- RIGHT SIDEBAR -->
            <div class="horse-sidebar">
                <div class="contact-card">
                    <span class="contact-card-tag">${horse.tag[currentLang]}</span>
                    <h3>${l.contact_title}<br><em style="font-style:italic; color:var(--gold-light);">${horse.name}</em>?</h3>
                    <p>${l.contact_body}</p>
                    <a href="index.html#contact" class="btn-contact">
                        ${l.contact_btn}
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </a>
                    <div class="contact-divider"></div>
                    <div class="contact-location">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        <p>Finca Lo Tacon s/n<br>San Pedro del Pinatar 30740<br>Murcia, España</p>
                    </div>
                </div>
            </div>

        </div>
    `;
}

render();
</script>
</body>
</html>
