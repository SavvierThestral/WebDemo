<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRH - Iberian Riding Horses</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ivory: #F8F5EE;
            --warm-white: #FDFBF7;
            --parchment: #EDE8DC;
            --gold: #B8935A;
            --gold-light: #D4AA78;
            --gold-pale: #F0E4CA;
            --ink: #1C1B18;
            --charcoal: #2E2D29;
            --stone: #6B6860;
            --stone-light: #A09D96;
            --border: rgba(28,27,24,0.12);
            --border-strong: rgba(28,27,24,0.22);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body { font-family: 'Jost', sans-serif; background: var(--warm-white); color: var(--ink); overflow-x: hidden; }
        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }

        /* ─── NAV ─── */
        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 3rem;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(253,251,247,0.97);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            color: var(--ink);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .nav-logo svg { width: 26px; height: 26px; }
        .nav-logo svg path { stroke: var(--ink); }
        .nav-links { display: flex; align-items: center; gap: 1.8rem; list-style: none; }
        .nav-links a {
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--stone);
            text-decoration: none;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--gold); }
        .nav-cta {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--gold) !important;
            border: 1px solid var(--gold);
            padding: 0.5rem 1.3rem;
            text-decoration: none;
            transition: background 0.3s, color 0.3s !important;
        }
        .nav-cta:hover { background: var(--gold) !important; color: white !important; }
        .nav-right { display: flex; align-items: center; gap: 1.5rem; }
        .lang-switcher { display: flex; align-items: center; border: 1px solid var(--border-strong); overflow: hidden; }
        .lang-btn { font-family: 'Jost', sans-serif; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.14em; padding: 0.35rem 0.7rem; background: transparent; border: none; color: var(--stone-light); cursor: pointer; transition: background 0.25s, color 0.25s; }
        .lang-btn.active { background: var(--gold); color: white; }
        .lang-btn:hover:not(.active) { color: var(--gold); }

        @media (max-width: 1100px) { .nav-links { display: none; } }
        @media (max-width: 768px) {
            .nav { padding: 0 1.2rem; height: 60px; }
            .nav-logo-text { display: none; }
        }

        /* ─── BREADCRUMB ─── */
        .breadcrumb-bar {
            background: var(--parchment);
            padding: 0.75rem 3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.72rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--stone);
        }
        .breadcrumb-bar a { color: var(--stone); text-decoration: none; transition: color 0.25s; }
        .breadcrumb-bar a:hover { color: var(--gold); }
        .breadcrumb-bar span { color: var(--gold); }
        @media (max-width: 768px) { .breadcrumb-bar { padding: 0.65rem 1.2rem; } }

        /* ─── SPLIT LAYOUT ─── */
        .horse-split {
            display: grid;
            grid-template-columns: 62% 38%;
            min-height: calc(100vh - 72px);
        }

        /* LEFT: imagen */
        .horse-photo-col {
            position: sticky;
            top: 72px;
            height: calc(100vh - 72px);
            background: var(--ink);
            overflow: hidden;
        }
        .horse-photo-col img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
            display: block;
            opacity: 0.95;
            position: absolute;
            inset: 0;
            transition: opacity 0.4s;
        }
        .horse-photo-col img.hidden {
            opacity: 0;
            pointer-events: none;
        }
        /* slider buttons */
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            background: rgba(28,27,24,0.55);
            border: 1px solid rgba(184,147,90,0.4);
            color: var(--gold-light);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: background 0.25s;
        }
        .slider-btn:hover { background: rgba(184,147,90,0.35); }
        .slider-btn.prev { left: 1rem; }
        .slider-btn.next { right: 1rem; }
        .slider-dots {
            position: absolute;
            bottom: 5.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
        }
        .slider-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(253,251,247,0.35);
            cursor: pointer;
            transition: background 0.25s;
        }
        .slider-dot.active { background: var(--gold); }
        .horse-photo-badge {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            background: rgba(28,27,24,0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(184,147,90,0.4);
            padding: 0.6rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .horse-photo-badge-tag {
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--gold-light);
        }
        .horse-photo-badge-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--warm-white);
            line-height: 1.1;
        }

        /* RIGHT: info */
        .horse-info-col {
            padding: 2rem 2rem 4rem;
            overflow-y: auto;
            background: var(--warm-white);
        }

        .horse-name {
            font-size: clamp(1.6rem, 2.2vw, 2.4rem);
            font-weight: 400;
            color: var(--ink);
            line-height: 1.05;
            letter-spacing: -0.02em;
            margin-bottom: 0.3rem;
        }
        .horse-sub {
            font-size: 0.72rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--stone-light);
            margin-bottom: 1.8rem;
        }

        /* specs */
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            margin-bottom: 1.8rem;
        }
        .spec-item { background: var(--warm-white); padding: 0.8rem 0.9rem; }
        .spec-label {
            font-size: 0.55rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--stone-light);
            display: block;
            margin-bottom: 0.25rem;
        }
        .spec-value { font-size: 0.82rem; font-weight: 500; color: var(--ink); }
        .spec-value.highlight { color: var(--gold); }

        /* pedigree section */
        .section-label {
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--gold);
            display: block;
            margin-bottom: 0.7rem;
        }

        /* description */
        .horse-desc {
            font-size: 0.85rem;
            font-weight: 300;
            line-height: 1.8;
            color: var(--stone);
            margin-bottom: 1.8rem;
        }

        /* contact CTA */
        .contact-cta {
            background: var(--ink);
            padding: 1.4rem 1.6rem;
            margin-bottom: 1.5rem;
        }
        .contact-cta-tag {
            display: inline-block;
            font-size: 0.58rem;
            font-weight: 600;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            background: var(--gold);
            color: white;
            padding: 0.25rem 0.7rem;
            margin-bottom: 1.2rem;
        }
        .contact-cta h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 400;
            color: var(--warm-white);
            margin-bottom: 0.5rem;
            line-height: 1.25;
        }
        .contact-cta p {
            font-size: 0.85rem;
            font-weight: 300;
            line-height: 1.7;
            color: rgba(253,251,247,0.55);
            margin-bottom: 1.5rem;
        }
        .btn-contact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: 100%;
            padding: 0.95rem;
            background: var(--gold);
            color: white;
            font-family: 'Jost', sans-serif;
            font-size: 0.76rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.3s, transform 0.2s;
            min-height: 48px;
        }
        .btn-contact:hover { background: var(--gold-light); transform: translateY(-1px); }
        .btn-contact:active { transform: translateY(0); }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--stone);
            text-decoration: none;
            font-size: 0.76rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-strong);
            padding-bottom: 3px;
            transition: color 0.25s, border-color 0.25s;
        }
        .back-link:hover { color: var(--gold); border-color: var(--gold); }

        /* ─── MOBILE ─── */
        @media (max-width: 860px) {
            .horse-split { grid-template-columns: 1fr; min-height: auto; }
            .horse-photo-col {
                position: relative;
                top: 0;
                height: 60vw;
                min-height: 280px;
                max-height: 480px;
            }
            .horse-info-col { padding: 2.5rem 1.5rem 4rem; }
        }
        @media (max-width: 480px) {
            .horse-info-col { padding: 2rem 1rem 3rem; }
            .horse-name { font-size: 2.2rem; }
        }

        /* ─── NOT FOUND ─── */
        .not-found { text-align: center; padding: 8rem 2rem; }
        .not-found h2 { font-size: 2rem; font-weight: 400; color: var(--ink); margin-bottom: 1rem; }
        .not-found p { font-size: 0.95rem; font-weight: 300; color: var(--stone); margin-bottom: 2rem; }
        .not-found a { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--gold); text-decoration: none; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; border-bottom: 1px solid var(--gold); padding-bottom: 2px; }

        /* ─── FOOTER ─── */
        footer {
            background: var(--ink);
            color: rgba(253,251,247,0.5);
            padding: 2rem 3rem;
            text-align: center;
            font-size: 0.78rem;
            font-weight: 300;
        }
        footer a { color: var(--gold-light); text-decoration: none; }

        /* ─── LIGHTBOX ─── */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(10,10,10,0.96);
            align-items: center;
            justify-content: center;
        }
        .lightbox.open { display: flex; }
        .lightbox-img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            user-select: none;
        }
        .lightbox-close {
            position: absolute;
            top: 1.2rem; right: 1.5rem;
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            font-size: 2rem;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }
        .lightbox-close:hover { color: white; }
        .lightbox-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            backdrop-filter: blur(4px);
        }
        .lightbox-btn:hover { background: rgba(184,147,90,0.4); }
        .lightbox-btn.prev { left: 1.5rem; }
        .lightbox-btn.next { right: 1.5rem; }
        .lightbox-counter {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.72rem;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.5);
        }
        .horse-photo-col { cursor: zoom-in; }
    </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
    <a href="index.html" class="nav-logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 26c0-6 4-10 10-12 3-1 6-3 7-6" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M16 14c-1-3 0-7 3-9" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M19 5c1 0 3 1 4 3" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M6 26l2-4" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M10 26l1-4" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="nav-logo-text">IRH - Iberian Riding Horses</span>
    </a>
    <div class="nav-right">
        <ul class="nav-links">
            <li><a href="index.html" data-i18n="nav_home">Home</a></li>
            <li><a href="catalogo.html" data-i18n="nav_catalog">Catálogo</a></li>
            <li><a href="index.html#contact" class="nav-cta" data-i18n="nav_contact">Contacto</a></li>
        </ul>
        <div class="lang-switcher">
            <button class="lang-btn" onclick="setLang('es')">ES</button>
            <button class="lang-btn active" onclick="setLang('en')">EN</button>
        </div>
    </div>
</nav>

<!-- DYNAMIC CONTENT -->
<div id="page-content"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
    <button class="lightbox-btn prev" onclick="lbSlide(-1); event.stopPropagation()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="">
    <button class="lightbox-btn next" onclick="lbSlide(1); event.stopPropagation()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <span class="lightbox-counter" id="lightbox-counter"></span>
</div>

<footer>
    <p>&copy; 2025 IRH - Iberian Riding Horses &nbsp;·&nbsp; Finca Lo Tacon s/n, San Pedro del Pinatar 30740 (Murcia) &nbsp;·&nbsp; <a href="index.html">Inicio</a> &nbsp;·&nbsp; <a href="catalogo.html">Catálogo</a></p>
</footer>

<script src="horses.js"></script>
<script>
const tr = {
    es: {
        nav_home:'Inicio', nav_catalog:'Catálogo', nav_contact:'Contacto',
        spec_discipline:'Disciplina', spec_level:'Nivel', spec_gender:'Género', spec_age:'Edad', spec_height:'Alzada', spec_profile:'Perfil jinete',
        spec_birth:'Nacimiento', spec_coat:'Capa', spec_father:'Padre', spec_mother:'Madre', spec_breeder:'Criador', spec_owner:'Titular', spec_microchip:'Microchip',
        section_pedigree:'Pedigree & Datos Registrales', section_desc:'Descripción',
        contact_title:'¿Te interesa', contact_body:'Contáctanos para más información o coordinar una visita.',
        contact_btn:'Contactar ahora', location_label:'Ubicación',
        back:'← Volver al Catálogo',
        not_found_title:'Caballo no encontrado', not_found_body:'El caballo que buscas no existe o ha sido retirado del catálogo.', not_found_link:'← Volver al Catálogo',
        years:'años'
    },
    en: {
        nav_home:'Home', nav_catalog:'Catalogue', nav_contact:'Contact',
        spec_discipline:'Discipline', spec_level:'Level', spec_gender:'Gender', spec_age:'Age', spec_height:'Height', spec_profile:'Rider profile',
        spec_birth:'Born', spec_coat:'Coat', spec_father:'Sire', spec_mother:'Dam', spec_breeder:'Breeder', spec_owner:'Owner', spec_microchip:'Microchip',
        section_pedigree:'Pedigree & Registration', section_desc:'Description',
        contact_title:'Interested in', contact_body:'Contact us for more information or to arrange a visit.',
        contact_btn:'Contact now', location_label:'Location',
        back:'← Back to Catalogue',
        not_found_title:'Horse not found', not_found_body:'The horse you are looking for does not exist or has been removed.', not_found_link:'← Back to Catalogue',
        years:'years old'
    }
};
let currentLang = 'en';

function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (tr[lang][key] !== undefined) el.innerHTML = tr[lang][key];
    });
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === lang));
    render();
}

function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
}

function render() {
    const l = tr[currentLang];
    const id = parseInt(getParam('id'));
    const horse = horses.find(h => h.id === id);
    const container = document.getElementById('page-content');

    if (!horse) {
        container.innerHTML = `
            <div class="not-found">
                <h2>${l.not_found_title}</h2>
                <p>${l.not_found_body}</p>
                <a href="catalogo.html">${l.not_found_link}</a>
            </div>`;
        return;
    }

    document.title = `${horse.name} | IRH - Iberian Riding Horses`;

    container.innerHTML = `
        <!-- BREADCRUMB -->
        <div class="breadcrumb-bar">
            <a href="index.html">${l.nav_home}</a>
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <a href="catalogo.html">${l.nav_catalog}</a>
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>${horse.name}</span>
        </div>

        <!-- SPLIT LAYOUT -->
        <div class="horse-split">

            <!-- IZQUIERDA: foto -->
            <div class="horse-photo-col" id="photo-col" onclick="openCurrentPhoto()">
                ${(horse.images && horse.images.length > 1 ? horse.images : [horse.image])
                    .map((src, i) => `<img src="${src}" alt="${horse.name} ${i+1}"${i > 0 ? ' class="hidden"' : ''}>`).join('')}
                ${horse.images && horse.images.length > 1 ? `
                <button class="slider-btn prev" onclick="slidePhoto(-1); event.stopPropagation()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <button class="slider-btn next" onclick="slidePhoto(1); event.stopPropagation()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
                <div class="slider-dots">
                    ${horse.images.map((_, i) => `<div class="slider-dot${i === 0 ? ' active' : ''}" onclick="goToPhoto(${i}); event.stopPropagation()"></div>`).join('')}
                </div>` : ''}
                <div class="horse-photo-badge">
                    <span class="horse-photo-badge-tag">${horse.disciplinaLabel} &nbsp;·&nbsp; ${horse.tag[currentLang]}</span>
                    <span class="horse-photo-badge-name">${horse.name}</span>
                </div>
            </div>

            <!-- DERECHA: info -->
            <div class="horse-info-col">
                <h1 class="horse-name">${horse.name}</h1>
                <p class="horse-sub">${horse.breed} &nbsp;·&nbsp; ${horse.age} ${l.years} &nbsp;·&nbsp; ${horse.height}</p>

                <div class="specs-grid">
                    <div class="spec-item">
                        <span class="spec-label">${l.spec_discipline}</span>
                        <span class="spec-value highlight">${horse.disciplinaLabel}</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">${l.spec_level}</span>
                        <span class="spec-value">${horse.nivelLabel}</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">${l.spec_gender}</span>
                        <span class="spec-value">${horse.generoLabel}</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">${l.spec_age}</span>
                        <span class="spec-value">${horse.age} ${l.years}</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">${l.spec_height}</span>
                        <span class="spec-value">${horse.height}</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">${l.spec_profile}</span>
                        <span class="spec-value">${horse.perfilLabel}</span>
                    </div>
                </div>

                ${horse.padre ? `
                <span class="section-label" style="margin-top:0.5rem;">${l.section_pedigree}</span>
                <div class="specs-grid" style="margin-bottom:2.5rem;">
                    ${horse.nacimiento ? `<div class="spec-item"><span class="spec-label">${l.spec_birth}</span><span class="spec-value">${horse.nacimiento}</span></div>` : ''}
                    ${horse.capa ? `<div class="spec-item"><span class="spec-label">${l.spec_coat}</span><span class="spec-value">${horse.capa}</span></div>` : ''}
                    ${horse.padre ? `<div class="spec-item"><span class="spec-label">${l.spec_father}</span><span class="spec-value">${horse.padre}</span></div>` : ''}
                    ${horse.madre ? `<div class="spec-item"><span class="spec-label">${l.spec_mother}</span><span class="spec-value">${horse.madre}</span></div>` : ''}
                    ${horse.criador ? `<div class="spec-item"><span class="spec-label">${l.spec_breeder}</span><span class="spec-value">${horse.criador}</span></div>` : ''}
                    ${horse.titular ? `<div class="spec-item"><span class="spec-label">${l.spec_owner}</span><span class="spec-value">${horse.titular}</span></div>` : ''}
                    ${horse.microchip ? `<div class="spec-item" style="grid-column:1/-1;"><span class="spec-label">${l.spec_microchip}</span><span class="spec-value" style="font-size:0.8rem;letter-spacing:0.04em;">${horse.microchip}</span></div>` : ''}
                </div>` : ''}

                <span class="section-label">${l.section_desc}</span>
                <p class="horse-desc">${horse.desc[currentLang]}</p>

                <div class="contact-cta">
                    <span class="contact-cta-tag">${horse.tag[currentLang]}</span>
                    <h3>${l.contact_title} <em style="font-style:italic; color:var(--gold-light);">${horse.name}</em>?</h3>
                    <p>${l.contact_body}</p>
                    <a href="index.html#contact" class="btn-contact">
                        ${l.contact_btn}
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </a>
                </div>

                <a href="catalogo.html" class="back-link">${l.back}</a>
            </div>

        </div>
    `;
}

/* ── LIGHTBOX ── */
let lbImages = [];
let lbIndex = 0;

function openCurrentPhoto() {
    const imgs = document.querySelectorAll('#photo-col img');
    if (!imgs.length) return;
    // Solo abre la foto actual (sin navegación en el lightbox)
    lbImages = [imgs[currentSlide].src];
    lbIndex = 0;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function openLightbox(index) {
    lbIndex = index != null ? index : currentSlide;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
}
function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
}
function lbSlide(dir) {
    lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
    updateLightbox();
}
function updateLightbox() {
    document.getElementById('lightbox-img').src = lbImages[lbIndex];
    const multi = lbImages.length > 1;
    document.getElementById('lightbox-counter').textContent = multi ? `${lbIndex + 1} / ${lbImages.length}` : '';
    document.querySelector('.lightbox-btn.prev').style.display = multi ? 'flex' : 'none';
    document.querySelector('.lightbox-btn.next').style.display = multi ? 'flex' : 'none';
}
document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lbSlide(-1);
    if (e.key === 'ArrowRight') lbSlide(1);
});

let currentSlide = 0;
function slidePhoto(dir) {
    const imgs = document.querySelectorAll('#photo-col img');
    const dots = document.querySelectorAll('.slider-dot');
    if (!imgs.length) return;
    imgs[currentSlide].classList.add('hidden');
    if (dots[currentSlide]) dots[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + dir + imgs.length) % imgs.length;
    imgs[currentSlide].classList.remove('hidden');
    if (dots[currentSlide]) dots[currentSlide].classList.add('active');
}
function goToPhoto(index) {
    slidePhoto(index - currentSlide);
}

// Initial render
render();
const _id = parseInt(new URLSearchParams(window.location.search).get('id'));
const _horse = horses.find(h => h.id === _id);
if (_horse) lbImages = (_horse.images && _horse.images.length > 1) ? _horse.images : [_horse.image];
</script>
